version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mindbridge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mindbridge
      POSTGRES_DB: mindbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: mindbridge-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mindbridge.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: mindbridge-network
